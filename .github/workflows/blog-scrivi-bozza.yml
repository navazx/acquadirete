name: Blog - scrivi bozza (settimanale)

# Ogni lunedì genera con l'IA il prossimo articolo della coda, lo salva sul ramo
# bozza-blog (NON su main) e lo manda su Telegram per l'approvazione.
# La pubblicazione avviene poi col workflow "blog-pubblica" quando rispondi PUBBLICA.

on:
  schedule:
    - cron: '0 7 * * 1'   # lunedì 07:00 UTC (09:00 ora italiana in estate)
  workflow_dispatch: {}    # avvio manuale per i test

permissions:
  contents: write

jobs:
  scrivi-bozza:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      CHAT_ID: '6369351410'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: C'è già una bozza in attesa?
        id: check
        run: |
          if git ls-remote --exit-code --heads origin bozza-blog >/dev/null 2>&1; then
            printf '%s' "C'è già una bozza blog in attesa: rispondi PUBBLICA o ANNULLA prima di generarne una nuova." > /tmp/m.txt
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -F "chat_id=${CHAT_ID}" -F "text=</tmp/m.txt" >/dev/null
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Installa dipendenze
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Genera l'articolo con l'IA
        id: gen
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OUT_MD: /tmp/bozza.md
        run: |
          set +e
          node scripts/genera-articolo.mjs
          code=$?
          set -e
          if [ "$code" = "3" ]; then
            printf '%s' "Coda articoli esaurita: non ci sono nuovi argomenti da scrivere. Aggiungine altri quando vuoi." > /tmp/m.txt
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -F "chat_id=${CHAT_ID}" -F "text=</tmp/m.txt" >/dev/null
            echo "done=coda_finita" >> "$GITHUB_OUTPUT"
          elif [ "$code" != "0" ]; then
            exit "$code"
          else
            echo "done=ok" >> "$GITHUB_OUTPUT"
          fi

      - name: Verifica build
        if: steps.check.outputs.skip == 'false' && steps.gen.outputs.done == 'ok'
        run: npm run build

      - name: Crea ramo bozza-blog e invia su Telegram
        if: steps.check.outputs.skip == 'false' && steps.gen.outputs.done == 'ok'
        run: |
          git config user.name "Blog Bot Acquadirete"
          git config user.email "matteopiconese@gmail.com"
          git checkout -b bozza-blog
          git add lib/blogPosts.ts
          git commit -m "Bozza blog: ${{ steps.gen.outputs.title }}"
          git push origin bozza-blog

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "document=@/tmp/bozza.md;type=text/markdown" \
            -F "caption=Nuova bozza blog" >/dev/null

          printf '%s' "📝 Nuova bozza pronta: «${{ steps.gen.outputs.title }}». Rispondi PUBBLICA per metterla online oppure ANNULLA per scartarla." > /tmp/msg.txt
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -F "chat_id=${CHAT_ID}" -F "text=</tmp/msg.txt" >/dev/null

      - name: Avvisa in caso di errore
        if: failure() && steps.check.outputs.skip == 'false'
        run: |
          printf '%s' "⚠️ La generazione della bozza blog è fallita. Controlla i log su GitHub Actions." > /tmp/err.txt
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" -F "chat_id=${CHAT_ID}" -F "text=</tmp/err.txt" >/dev/null
