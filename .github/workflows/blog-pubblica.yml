name: Blog - pubblica su conferma Telegram

# Controlla ogni 15 minuti se c'è una bozza (ramo bozza-blog) e se hai risposto
# PUBBLICA o ANNULLA sul bot Telegram. Ha i permessi di scrittura su GitHub che
# l'ambiente cloud non ha, quindi può pubblicare/cancellare davvero.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # necessario per push su main e cancellazione del ramo

jobs:
  gestisci-bozza:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Gestisci la conferma Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: '6369351410'
        run: |
          set -e

          send_tg() {
            printf '%s' "$1" > /tmp/tg_msg.txt
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -F "chat_id=${CHAT_ID}" -F "text=</tmp/tg_msg.txt" > /dev/null
          }

          # 1) C'è una bozza in attesa?
          if ! git ls-remote --exit-code --heads origin bozza-blog >/dev/null 2>&1; then
            echo "Nessuna bozza (ramo bozza-blog) in attesa. Esco."
            exit 0
          fi
          echo "Bozza presente. Leggo l'ultima risposta su Telegram."

          # 2) Ultimo messaggio dal tuo chat
          UPDATES=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates")
          CMD=$(echo "$UPDATES" | jq -r --arg cid "$CHAT_ID" \
            '[.result[] | select(.message.chat.id == ($cid|tonumber)) | .message.text] | last // ""')
          CMD_UP=$(echo "$CMD" | tr '[:lower:]' '[:upper:]' | tr -d '[:space:]')
          echo "Ultimo comando interpretato: '$CMD_UP'"

          git config user.name "Blog Bot Acquadirete"
          git config user.email "matteopiconese@gmail.com"

          if [ "$CMD_UP" = "PUBBLICA" ]; then
            echo "Pubblico la bozza."
            git fetch origin bozza-blog
            git merge --no-edit origin/bozza-blog
            git push origin main
            git push origin --delete bozza-blog
            send_tg "✅ Articolo pubblicato: online tra 1-2 minuti su https://www.acquadirete.it"
          elif [ "$CMD_UP" = "ANNULLA" ]; then
            echo "Annullo la bozza."
            git push origin --delete bozza-blog
            send_tg "🗑 Bozza annullata."
          else
            echo "Nessun comando PUBBLICA/ANNULLA come ultimo messaggio: non faccio nulla."
          fi
