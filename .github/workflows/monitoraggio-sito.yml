name: Monitoraggio sito Acquadirete

# Quando gira:
on:
  schedule:
    - cron: '0 6 * * 1'   # ogni lunedì alle 06:00 UTC (08:00 ora italiana in estate)
  workflow_dispatch: {}    # permette anche l'avvio manuale (pulsante "Run workflow") per i test

jobs:
  monitoraggio:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla le pagine e invia il report su Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: '6369351410'
        run: |
          DATA=$(date -u '+%d/%m/%Y %H:%M UTC')

          check_page() {
            local code
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$1")
            if [ "$code" = "200" ]; then echo "OK"; else echo "ERRORE $code"; fi
          }

          P1=$(check_page "https://www.acquadirete.it/")
          P2=$(check_page "https://www.acquadirete.it/depuratore-acqua-firenze")
          P3=$(check_page "https://www.acquadirete.it/contatti")
          P4=$(check_page "https://www.acquadirete.it/recensioni")
          P5=$(check_page "https://www.acquadirete.it/blog")
          P6=$(check_page "https://www.acquadirete.it/sitemap.xml")

          TITLE=$(curl -s -L --max-time 15 "https://www.acquadirete.it/" | grep -i "<title" | head -1)
          if echo "$TITLE" | grep -qi "acquadirete"; then TITLE_STATUS="OK"; else TITLE_STATUS="non trovato"; fi

          OK_COUNT=0
          for s in "$P1" "$P2" "$P3" "$P4" "$P5" "$P6"; do
            [ "$s" = "OK" ] && OK_COUNT=$((OK_COUNT+1))
          done

          if [ "$OK_COUNT" -eq 6 ] && [ "$TITLE_STATUS" = "OK" ]; then
            SUMMARY="SITO FUNZIONANTE"
          else
            SUMMARY="ATTENZIONE: problemi rilevati!"
          fi

          printf 'Monitoraggio Acquadirete\nData: %s\n\nHomepage: %s\n/depuratore-acqua-firenze: %s\n/contatti: %s\n/recensioni: %s\n/blog: %s\n/sitemap.xml: %s\nTitolo: %s\n\nRiepilogo: %d/6 pagine OK\n%s' \
            "$DATA" "$P1" "$P2" "$P3" "$P4" "$P5" "$P6" "$TITLE_STATUS" "$OK_COUNT" "$SUMMARY" > /tmp/tg_msg.txt

          echo "--- Report che invio ---"
          cat /tmp/tg_msg.txt
          echo ""
          echo "--- Invio Telegram ---"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -F "chat_id=${CHAT_ID}" \
            -F "text=</tmp/tg_msg.txt"
