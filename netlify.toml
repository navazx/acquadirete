  force = true

[[redirects]]
  from = "/scheda/23.modelli-a-colonna-da-terra-per-ufficio*"
  to = "/depuratore-acqua-uffici-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/scheda/19.vari-modelli-da-incasso-e-sotto-lavello*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/scheda/22.vari-modelli-e-colori-sopra-banco*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

# --- /servizi_scheda/*.aspx (maiuscole come da vecchio sito) → pagina tematica ---
[[redirects]]
  from = "/servizi_scheda/18.Impianti-ad-osmosi-inversa-sottozoccolo-per-la-cucina*"
  to = "/osmosi-inversa-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/servizi_scheda/23.Modelli-a-colonna-da-terra-per-ufficio*"
  to = "/depuratore-acqua-uffici-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/servizi_scheda/19.Vari-modelli-da-incasso-e-sotto-lavello*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

# --- Catch-all di sicurezza: qualsiasi altra vecchia pagina di questi percorsi
#     finisce in home invece di dare 404. Restano DOPO le regole specifiche. ---
[[redirects]]
  from = "/paginaseo/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/scheda/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/servizi_scheda/*"
  to = "/"
  status = 301
  force = true

# Vecchie gallerie foto del sito ASP.NET (es. /Foto/Pagine/26/Marmaris/).
[[redirects]]
  from = "/Foto/*"
  to = "/"
  status = 301
  force = true
