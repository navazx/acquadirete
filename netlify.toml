[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "24"

# Funzioni serverless (endpoint /api/lead e /api/meta-leads): copiano i lead
# del form del sito e dei moduli Meta sul foglio Google (env LEADS_SHEET_ID,
# GSC_KEY_JSON, META_*).
[functions]
  directory = "netlify/functions"

# Redirect 301 dalle vecchie URL del sito ASP.NET (ancora indicizzate su Google)
# verso le pagine nuove. Evita i 404 su chi arriva dai risultati di ricerca e
# consolida l'autorità SEO sulle pagine attuali.
# NB:
#  - Le regole specifiche DEVONO stare prima dei catch-all (Netlify usa la prima
#    che combacia).
#  - Il "*" finale cattura sia la versione con ".aspx" sia quella senza (Google
#    ha indicizzato entrambe), sia eventuali code varie.
#  - Gli URL di destinazione hanno lo slash finale (trailingSlash: true).

# --- Vecchia home ---
[[redirects]]
  from = "/default.aspx"
  to = "/"
  status = 301
  force = true

# --- /paginaseo/* → pagina servizio/città più pertinente ---
[[redirects]]
  from = "/paginaseo/3.vendita-depuratori-acqua-prato*"
  to = "/depuratore-acqua-prato/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/2.vendita-depuratori-acqua-sesto-fiorentino*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/4.vendita-depuratori-acqua-a-scandicci*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/8.sistemi-di-depurazione-acqua-domestici-a-sesto-fiorentino*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/9.sistemi-di-depurazione-acqua-domestici-a-scandicci*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/10.sistemi-di-depurazione-acqua-domestici-a-empoli*"
  to = "/depuratore-acqua-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/16.sistema-filtrazione-acqua-rubinetto-firenze*"
