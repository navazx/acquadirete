  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/13.depuratori-a-osmosi-inversa-a-prato*"
  to = "/osmosi-inversa-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/14.depuratori-a-osmosi-inversa-a-sesto-fiorentino*"
  to = "/osmosi-inversa-firenze/"
  status = 301
  force = true

[[redirects]]
  from = "/paginaseo/15.depuratori-a-osmosi-inversa-a-scandicci*"
  to = "/osmosi-inversa-firenze/"
  status = 301
  force = true

# --- /scheda/* (schede prodotto) → pagina tematica ---
[[redirects]]
  from = "/scheda/18.impianti-ad-osmosi-inversa-sottozoccolo-per-la-cucina*"
